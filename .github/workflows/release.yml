name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

jobs:
  release:
    if: >-
      ${{
        (
          startsWith(github.event.inputs.semver, 'pre') ||
          github.ref == format(
            'refs/heads/{0}',
            github.event.repository.default_branch
          )
        ) &&
        (
          github.event.pull_request.merged &&
          github.event.pull_request.user.login == 'optic-release-automation[bot]'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Get current version
        id: version
        run: |
          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - uses: nearform-actions/optic-release-automation-action@a2785548e8bdafab7e628c2317b604278e460434 # v4.12.2
        with:
          commit-message: "Release {version}"
          sync-semver-tags: false
          access: "public"
          semver: ${{ steps.version.outputs.VERSION }}
          # Don't notify linked issues
          notify-linked-issues: false
          publish-mode: oidc
          build-command: |
            npm ci
            npm run build
